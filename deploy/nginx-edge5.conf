# ============================================================================
# Nginx reverse proxy for the Edge5 dashboard — HTTPS remote access
# ============================================================================
# Install:
#   1. Replace YOUR_DOMAIN with your domain (must point at the VPS IP).
#   2. sudo cp deploy/nginx-edge5.conf /etc/nginx/sites-available/edge5
#      sudo ln -s /etc/nginx/sites-available/edge5 /etc/nginx/sites-enabled/
#   3. Get a certificate: sudo certbot --nginx -d YOUR_DOMAIN
#      (certbot rewrites this file with the ssl_certificate lines)
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# If you have no domain, use the IP-only fallback at the bottom instead
# (self-signed cert or plain HTTP over a VPN/WireGuard tunnel — do NOT expose
# plain HTTP on the open internet, the session cookie would travel cleartext).
# ============================================================================

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # certbot will add the 301 → https redirect here.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Forward the real client + protocol so the app can set the Secure
        # cookie flag correctly (dashboard-auth.ts reads x-forwarded-proto).
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / long-poll friendliness for the live status stream.
        proxy_read_timeout 90s;
        proxy_buffering off;

        # WebSocket upgrade (Next.js HMR is dev-only, but harmless in prod).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health endpoint may be probed frequently; keep logs quiet.
    location = /api/v2/bot/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
}

# ---------------------------------------------------------------------------
# Hardening checklist (apply on the VPS):
#   • ufw allow 80,443/tcp && ufw deny 3000/tcp   ← Next.js must NOT be
#     reachable directly, only through Nginx.
#   • In ecosystem.config.js the app binds 0.0.0.0 by default; restrict it:
#     add HOSTNAME=127.0.0.1 to the env block so only Nginx can reach it.
#   • Rate-limit the login endpoint (optional, app has its own throttle):
#       limit_req_zone $binary_remote_addr zone=login:1m rate=10r/m;
#       location = /api/auth/login { limit_req zone=login; proxy_pass ...; }
# ---------------------------------------------------------------------------
